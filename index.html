<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lima Llama 🦙</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; }
    #map { width: 100%; height: 100%; }

    /* Canvas for shadow + speech bubble only */
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* The llama GIF */
    #llama {
      position: absolute;
      pointer-events: none;
      z-index: 6;
      height: 130px;
      width: auto;
      display: none;
      transform-origin: bottom center;
      image-rendering: auto;
      opacity: 1;
      /* opacity driven by JS render loop – no CSS transition */
    }

    #label {
      position: absolute;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.88);
      color: #fff;
      padding: 10px 24px;
      border-radius: 28px;
      font-size: 17px;
      letter-spacing: 1px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
    #label.show { opacity: 1; }

    #title {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 20;
      pointer-events: none;
    }
    #start-screen {
      position: absolute; inset: 0;
      background: rgba(10, 10, 30, 0.82);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    #start-screen.ready { cursor: pointer; }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
    #start-screen img { height: 160px; width: auto; margin-bottom: 28px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5)); }
    #start-screen h1 { color: #fff; font-size: 28px; letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 10px; }
    #start-desc {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      line-height: 1.7;
      letter-spacing: 0.5px;
      max-width: 380px;
      text-align: center;
      margin-bottom: 22px;
    }
    #start-hint {
      color: rgba(255,255,255,0.5); font-size: 14px;
      letter-spacing: 2px; transition: all 0.4s;
    }
    #start-hint.ready {
      color: #fff; font-size: 20px; letter-spacing: 4px;
      text-shadow: 0 0 24px rgba(255,255,255,0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    #progress-bar {
      width: 200px; height: 3px; margin-top: 22px;
      background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden;
      transition: opacity 0.4s;
    }
    #progress-bar.done { opacity: 0; pointer-events: none; }
    #progress-fill {
      height: 100%; width: 0%; background: rgba(255,255,255,0.6);
      border-radius: 2px; transition: width 0.3s;
    }

    #fullscreen-btn {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 20;
      background: rgba(10,10,30,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #fullscreen-btn:hover { background: rgba(40,40,80,0.95); }
  </style>
</head>
<body>

<div id="map"></div>
<canvas id="overlay"></canvas>
<img id="llama" src="https://media.tenor.com/s14QGGaouQoAAAAj/llama-balloon.gif" alt="llama">
<div id="start-screen">
  <img src="https://media.tenor.com/s14QGGaouQoAAAAj/llama-balloon.gif" alt="Lima Llama">
  <h1>Lima Llama</h1>
  <p id="start-desc">LIMA LLAMA is a world map on which a llama hops between various locations where Günther was arrested, expelled from a country, or became a matter of official record in some way.</p>
  <p id="start-hint">Lade Karte …</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<div id="label"></div>
<div id="title">Lima Llama 🦙</div>
<button id="fullscreen-btn" title="Vollbild">⛶</button>

<script>
// ═══════════════════════════════════════════════════════════════
// MAPBOX
// ═══════════════════════════════════════════════════════════════
mapboxgl.accessToken = 'pk.eyJ1IjoiYWxleGFuZGVyaHViZXJub3dhayIsImEiOiJjbXEyMndyZDYwd3VxMnBwZ2p3aTlpdnRoIn0.UlTEH_bNGLkG6AXjj2N-SQ';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/outdoors-v12',
  center: [-65, -15],
  zoom: 3,
  projection: 'mercator',
  interactive: false
});

// ═══════════════════════════════════════════════════════════════
// CANVAS (shadow + speech bubble only)
// ═══════════════════════════════════════════════════════════════
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');
const llamaEl = document.getElementById('llama');

function resizeOverlay() {
  const dpr = window.devicePixelRatio || 1;
  overlay.width  = window.innerWidth  * dpr;
  overlay.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
}
resizeOverlay();
window.addEventListener('resize', resizeOverlay);

// ═══════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const MELODY = [523.25, 659.25, 783.99, 880, 1046.5, 880, 783.99, 659.25, 523.25, 392, 440, 523.25];
let melodyIdx   = 0;
let melodyTimer = null;

function playNote(freq) {
  const a   = ac();
  const dur = 0.55;
  const vol = 0.005;

  // Vibrato LFO
  const lfo  = a.createOscillator();
  const lfoG = a.createGain();
  lfo.frequency.value = 5.5;
  lfoG.gain.value = 4; // ±4 Hz vibrato depth
  lfo.connect(lfoG);

  const osc  = a.createOscillator();
  const gain = a.createGain();
  lfoG.connect(osc.frequency);
  osc.connect(gain);
  gain.connect(a.destination);

  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, a.currentTime);
  // Soft attack, long sustain, fade out
  gain.gain.setValueAtTime(0, a.currentTime);
  gain.gain.linearRampToValueAtTime(vol, a.currentTime + 0.08);
  gain.gain.setValueAtTime(vol, a.currentTime + dur - 0.1);
  gain.gain.linearRampToValueAtTime(0, a.currentTime + dur);

  lfo.start(a.currentTime);
  osc.start(a.currentTime);
  lfo.stop(a.currentTime + dur + 0.01);
  osc.stop(a.currentTime + dur + 0.01);
}

function startMelody() {
  if (melodyTimer) return;
  melodyTimer = setInterval(() => {
    playNote(MELODY[melodyIdx % MELODY.length]);
    melodyIdx++;
  }, 420); // slower, more legato
  hummingAudio.currentTime = 0;
  hummingAudio.play().catch(() => {});
}

function stopMelody() {
  clearInterval(melodyTimer);
  melodyTimer = null;
  hummingAudio.pause();
}

const screamAudio  = new Audio('166625__jzazvurek__childs-scream-8.wav');
const hummingAudio = new Audio('humming.wav');
hummingAudio.loop  = true;
const bellAudio    = new Audio('bell.mp3');
bellAudio.volume   = 0.1;

function playScream() {
  screamAudio.currentTime = 0;
  screamAudio.play().catch(() => {});
}

function playBell() {
  bellAudio.currentTime = 0;
  bellAudio.play().catch(() => {});
}

// ═══════════════════════════════════════════════════════════════
// LOCATIONS
// ═══════════════════════════════════════════════════════════════
let locations = [];
let locIdx    = 0;

async function loadLocations() {
  const res = await fetch('locations.json');
  locations = await res.json();
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION STATE
// ═══════════════════════════════════════════════════════════════
const PHASE = { IDLE: 0, HOPPING: 1, SCREAMING: 2 };

let phase       = PHASE.IDLE;
let facingRight = true;

let hopStart    = 0, hopDur = 0;
let hopFromLng  = 0, hopFromLat = 0;
let hopToLng    = 0, hopToLat   = 0;
const ARC_H     = 100;

let screamStart = 0;
const SCREAM_DUR = 3200;

let bubbleText   = '';
let bubbleTgt    = 'AAAAAAH!';
let bubbleTimer  = 0;

let scrX = 0, scrY = 0;

let showCross = false;
let crossX = 0, crossY = 0;

// JS-driven fade (keeps llama, shadow and bubble perfectly in sync)
let llamaFadeAlpha = 1;
let fadeOutActive  = false;
let fadeInActive   = false;
let fadeStartTime  = 0;
const FADE_OUT_DUR = 1000;
const FADE_IN_DUR  = 900;

const label = document.getElementById('label');

function lerp(a, b, t) { return a + (b - a) * t; }
function project(lng, lat) { const p = map.project([lng, lat]); return [p.x, p.y]; }

function showLabel(name) {
  label.textContent = '📍 ' + name;
  label.classList.add('show');
  setTimeout(() => label.classList.remove('show'), 3500);
}

// ── hop ────────────────────────────────────────────────────────
function startHop() {
  if (locations.length < 2) return;
  const from = locations[locIdx];
  const to   = locations[(locIdx + 1) % locations.length];

  hopFromLng = from.lng; hopFromLat = from.lat;
  hopToLng   = to.lng;   hopToLat   = to.lat;
  facingRight = to.lng >= from.lng;

  const dlng = to.lng - from.lng, dlat = to.lat - from.lat;
  hopDur = Math.min(6000, Math.max(2000, Math.sqrt(dlng*dlng + dlat*dlat) * 85));

  hopStart = performance.now();
  phase    = PHASE.HOPPING;
  startMelody();

  // Zoom so the jump distance fits comfortably on screen.
  // map.setCenter() in the render loop keeps the llama always visible.
  const dist = Math.sqrt(dlng*dlng + dlat*dlat);
  const zoom = Math.max(2, Math.min(8, Math.log2(400 / Math.max(dist, 0.1))));
  map.easeTo({ zoom, duration: 600, essential: true });
}

function onArrival() {
  locIdx = (locIdx + 1) % locations.length;
  phase  = PHASE.SCREAMING;
  screamStart = performance.now();
  bubbleText  = '';
  bubbleTgt   = locations[locIdx].scream || 'AAAAAAH!';
  bubbleTimer = 0;
  stopMelody();

  const loc    = locations[locIdx];
  const isLast = locIdx === locations.length - 1;

  showLabel(loc.name);
  map.flyTo({ center: [loc.lng, loc.lat], zoom: 5, duration: 1000, essential: true });

  if (isLast) {
    // Finale: bell toll, llama fades, cross appears, 5s pause, restart
    playBell();

    // After bubble types in (~1.5s): start JS-driven fade + show cross
    setTimeout(() => {
      crossX = scrX;
      crossY = scrY;
      showCross    = true;
      fadeOutActive = true;
      fadeInActive  = false;
      fadeStartTime = performance.now();
    }, 1500);

    // After fade (1s) + 5s pause → restart at first location
    setTimeout(() => {
      showCross    = false;
      phase        = PHASE.IDLE;
      bubbleText   = '';
      locIdx       = 0;
      llamaFadeAlpha = 0;
      fadeOutActive  = false;
      const first = locations[0];
      map.flyTo({ center: [first.lng, first.lat], zoom: 5, duration: 1200, essential: true });
      setTimeout(() => {
        fadeInActive  = true;
        fadeStartTime = performance.now();
        setTimeout(showFirstArrival, FADE_IN_DUR + 300);
      }, 1200);
    }, 1500 + FADE_OUT_DUR + 5000); // ~7.5s total

  } else {
    playScream();
    setTimeout(() => { phase = PHASE.IDLE; startHop(); }, SCREAM_DUR + 200);
  }
}

// ═══════════════════════════════════════════════════════════════
// GRAVE CROSS
// ═══════════════════════════════════════════════════════════════
function drawGraveCross(ctx, cx, cy, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const vw   = 13;          // vertical bar width
  const hh   = 12;          // horizontal bar height
  const top  = cy - 60;     // top of vertical bar
  const bot  = cy + 2;      // bottom of vertical bar
  const armL = cx - 30;     // left end of crossbar
  const armR = cx + 30;     // right end of crossbar
  const armT = cy - 38;     // top of crossbar
  const armB = armT + hh;
  const r    = 5;            // corner radius

  function rrect(x, y, w, h) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y,     x + w, y + r,     r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  // Dirt mound
  const dirtG = ctx.createRadialGradient(cx, cy, 2, cx, cy + 4, 30);
  dirtG.addColorStop(0, '#b8884a');
  dirtG.addColorStop(1, '#6b4e22');
  ctx.fillStyle = dirtG;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 7, 30, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cast shadow (darkened ellipse, offset)
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(cx + 8, cy + 14, 24, 6, -0.15, 0, Math.PI * 2);
  ctx.fill();

  // Wood gradient (left→right gives cylindrical look on vertical bar)
  const woodG = ctx.createLinearGradient(cx - vw / 2, 0, cx + vw / 2, 0);
  woodG.addColorStop(0,    '#5a2a08');
  woodG.addColorStop(0.18, '#a04e1a');
  woodG.addColorStop(0.45, '#d07838');
  woodG.addColorStop(0.75, '#9a4c18');
  woodG.addColorStop(1,    '#4a2005');

  // Horizontal bar uses top→bottom gradient
  const hGrad = ctx.createLinearGradient(0, armT, 0, armB);
  hGrad.addColorStop(0,   '#c87030');
  hGrad.addColorStop(0.5, '#a05020');
  hGrad.addColorStop(1,   '#5c2a08');

  // Draw vertical bar
  rrect(cx - vw / 2, top, vw, bot - top);
  ctx.fillStyle   = woodG;
  ctx.fill();
  ctx.strokeStyle = '#2e1204';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Draw horizontal bar (on top)
  rrect(armL, armT, armR - armL, hh);
  ctx.fillStyle   = hGrad;
  ctx.fill();
  ctx.strokeStyle = '#2e1204';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Left-edge highlight on vertical bar → gives 3-D depth
  ctx.strokeStyle = 'rgba(255,195,110,0.38)';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - vw / 2 + 3, bot - 5);
  ctx.lineTo(cx - vw / 2 + 3, armB + 1);
  ctx.moveTo(cx - vw / 2 + 3, armT - 1);
  ctx.lineTo(cx - vw / 2 + 3, top + 7);
  ctx.stroke();

  // Top highlight on horizontal bar
  ctx.beginPath();
  ctx.moveTo(armL + 5, armT + 3);
  ctx.lineTo(armR - 5, armT + 3);
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
let lastT = 0;

// Llama image dimensions (GIF: 378x498, displayed at height=130px)
const LLAMA_H  = 130;
const LLAMA_W  = Math.round(130 * 378 / 498); // ≈ 99px

function render(now) {
  requestAnimationFrame(render);
  const dt = now - lastT;
  lastT = now;

  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  if (!locations.length || !map.isStyleLoaded()) return;

  let shake = 0;

  if (phase === PHASE.HOPPING) {
    const t = Math.min((now - hopStart) / hopDur, 1);
    const lng = lerp(hopFromLng, hopToLng, t);
    const lat = lerp(hopFromLat, hopToLat, t);
    // Follow the llama – map center tracks current position every frame
    map.setCenter([lng, lat]);
    const [sx, sy] = project(lng, lat);
    scrX = sx;
    scrY = sy - Math.sin(Math.PI * t) * ARC_H;
    if (t >= 1) onArrival();

  } else if (phase === PHASE.SCREAMING) {
    const loc = locations[locIdx];
    [scrX, scrY] = project(loc.lng, loc.lat);
    shake = showCross ? 0 : 4;  // no shake once cross is showing
    bubbleTimer += dt;
    if (bubbleTimer > 80 && bubbleText.length < bubbleTgt.length) {
      bubbleText += bubbleTgt[bubbleText.length];
      bubbleTimer = 0;
    }

  } else {
    const loc = locations[locIdx];
    [scrX, scrY] = project(loc.lng, loc.lat);
  }

  // ── JS-driven fade ────────────────────────────────────────────
  if (fadeOutActive) {
    llamaFadeAlpha = Math.max(0, 1 - (now - fadeStartTime) / FADE_OUT_DUR);
    if (llamaFadeAlpha === 0) fadeOutActive = false;
  } else if (fadeInActive) {
    llamaFadeAlpha = Math.min(1, (now - fadeStartTime) / FADE_IN_DUR);
    if (llamaFadeAlpha === 1) fadeInActive = false;
  }
  llamaEl.style.opacity = llamaFadeAlpha;

  // Random shake offset
  const ox = shake ? (Math.random() - 0.5) * shake * 2 : 0;
  const oy = shake ? (Math.random() - 0.5) * shake     : 0;

  // Position llama GIF
  // Anchor: bottom-center of image = feet at (scrX, scrY)
  llamaEl.style.left      = (scrX - LLAMA_W / 2 + ox) + 'px';
  llamaEl.style.top       = (scrY - LLAMA_H + oy) + 'px';
  llamaEl.style.transform = `scaleX(${facingRight ? -1 : 1})`;
  llamaEl.style.display   = 'block';

  // Shadow ellipse (canvas) – perfectly synced via llamaFadeAlpha
  ctx.save();
  ctx.globalAlpha = 0.25 * llamaFadeAlpha;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(scrX + ox * 0.5, scrY + 3, 28, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Speech bubble during scream – fades with llama
  if (phase === PHASE.SCREAMING && bubbleText.length > 0 && llamaFadeAlpha > 0.05) {
    // Head is roughly at top-center of the GIF
    const dir  = facingRight ? 1 : -1;
    const headX = scrX + dir * 38;
    const headY = scrY - LLAMA_H + 28;  // top area of GIF

    const bw = bubbleText.length * 11 + 24;
    const bh = 32;
    const bx = headX + dir * 10;
    const by = headY - bh - 8;

    ctx.save();

    const r    = 8;                                      // corner radius
    const tailBX = facingRight ? bx + 14 : bx + bw - 22;
    const tx1  = tailBX, tx2 = tailBX + 7, tx3 = tailBX + 14;
    const ty   = by + bh, tipY = by + bh + 10;

    // Single path: rounded rect + tail as one shape → one stroke, no seam
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bw - r, by);
    ctx.arcTo(bx + bw, by,     bx + bw, by + r,     r);
    ctx.lineTo(bx + bw, by + bh - r);
    ctx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
    ctx.lineTo(tx3, ty);
    ctx.lineTo(tx2, tipY);   // tail tip
    ctx.lineTo(tx1, ty);
    ctx.lineTo(bx + r, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - r, r);
    ctx.lineTo(bx, by + r);
    ctx.arcTo(bx, by, bx + r, by, r);
    ctx.closePath();

    ctx.fillStyle   = '#FFFDE4';
    ctx.strokeStyle = '#444';
    ctx.lineWidth   = 2;
    ctx.fill();
    ctx.stroke();

    // Text
    ctx.fillStyle = '#B71C1C';
    ctx.font = 'bold 15px "Courier New", monospace';
    ctx.fillText(bubbleText, bx + 12, by + 21);

    ctx.restore();
  }
}

requestAnimationFrame(render);

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
const startScreen  = document.getElementById('start-screen');
const startHint    = document.getElementById('start-hint');
const progressFill = document.getElementById('progress-fill');
let userClicked    = false;
let preloadDone    = false;
let started        = false;

// Show arrival sequence at the very first location (loc[0]) before any hop
function showFirstArrival() {
  locIdx = 0;
  const loc = locations[0];
  [scrX, scrY] = project(loc.lng, loc.lat);
  phase       = PHASE.SCREAMING;
  screamStart = performance.now();
  bubbleText  = '';
  bubbleTgt   = loc.scream || 'AAAAAAH!';
  bubbleTimer = 0;
  playScream();
  showLabel(loc.name);
  map.flyTo({ center: [loc.lng, loc.lat], zoom: 5, duration: 800, essential: true });
  setTimeout(() => { phase = PHASE.IDLE; startHop(); }, SCREAM_DUR + 200);
}

function tryStart() {
  if (started || !preloadDone || !userClicked) return;
  started = true;
  ac().resume();
  startScreen.classList.add('hidden');
  setTimeout(() => { startScreen.style.display = 'none'; }, 500);
  showFirstArrival(); // start at loc[0] with scream, then hop to loc[1]
}

startScreen.addEventListener('click', () => {
  if (!preloadDone) return; // ignore clicks while loading
  userClicked = true;
  tryStart();
});

// Visit every location silently to warm up the tile cache
async function preloadTiles() {
  const hint = startHint;
  const fill = progressFill;

  function waitIdle() {
    return new Promise(resolve => {
      const t = setTimeout(resolve, 1500); // max wait per location
      map.once('idle', () => { clearTimeout(t); resolve(); });
    });
  }

  for (let i = 0; i < locations.length; i++) {
    const loc = locations[i];
    map.jumpTo({ center: [loc.lng, loc.lat], zoom: 5 });
    await waitIdle();
    fill.style.width = ((i + 1) / locations.length * 100) + '%';
  }

  // Return to first location
  map.jumpTo({ center: [locations[0].lng, locations[0].lat], zoom: 4 });
  [scrX, scrY] = project(locations[0].lng, locations[0].lat);
  await waitIdle();

  preloadDone = true;
  hint.textContent = 'Klicken zum Starten';
  hint.classList.add('ready');
  document.getElementById('progress-bar').classList.add('done');
  startScreen.classList.add('ready');
  tryStart();
}

// Fullscreen
const fsBtn = document.getElementById('fullscreen-btn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    fsBtn.textContent = '✕';
    fsBtn.title = 'Vollbild beenden';
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    fsBtn.textContent = '⛶';
    fsBtn.title = 'Vollbild';
  }
});

map.on('load', async () => {
  await loadLocations();
  if (!locations.length) return;
  preloadTiles();
});
</script>
</body>
</html>
